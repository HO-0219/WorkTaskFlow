spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.application.name=team-project-auth-api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/teamProject?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:test}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:1}
spring.flyway.validate-migration-naming=true

logging.level.org.springframework.web=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:INFO}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

spring.security.oauth2.client.registration.google.client-id=${OAUTH2_GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.kakao.client-id=${OAUTH2_KAKAO_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.kakao.client-secret=${OAUTH2_KAKAO_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

server.port=${SERVER_PORT:8081}

app.frontend-url=${FRONTEND_URL:http://localhost:5174}
app.mail.from=${MAIL_FROM:no-reply@team-project.local}
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.verification-minutes=${MAIL_VERIFICATION_MINUTES:10}
app.mail.password-reset-minutes=${PASSWORD_RESET_MINUTES:30}
app.group.invitation-hours=${GROUP_INVITATION_HOURS:72}
app.notification.due-soon-cron=${NOTIFICATION_DUE_SOON_CRON:0 */15 * * * *}
app.jwt.secret=${JWT_SECRET:local-development-secret-change-me-1234567890}
app.jwt.access-seconds=${JWT_ACCESS_SECONDS:3600}
app.jwt.refresh-seconds=${JWT_REFRESH_SECONDS:1209600}
app.jwt.secure-cookie=${AUTH_SECURE_COOKIE:false}
