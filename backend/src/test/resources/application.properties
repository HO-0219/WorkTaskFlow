app.mail.enabled=false
app.mail.from=no-reply@test.local
app.mail.verification-minutes=10
app.mail.password-reset-minutes=30
app.group.invitation-hours=72
app.jwt.secret=test-secret-that-is-long-enough-for-hmac-sha-256
app.jwt.access-seconds=3600
app.jwt.refresh-seconds=1209600
app.jwt.secure-cookie=false
app.frontend-url=http://localhost:5174

spring.datasource.url=jdbc:h2:mem:test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
spring.mail.host=localhost

spring.security.oauth2.client.registration.google.client-id=disabled
spring.security.oauth2.client.registration.google.client-secret=disabled
spring.security.oauth2.client.registration.kakao.client-id=disabled
spring.security.oauth2.client.registration.kakao.client-secret=disabled
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
